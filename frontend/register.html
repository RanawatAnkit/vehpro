<!DOCTYPE html>
<html>
<head>
  <title>Register</title>
  <style>
    body {
      font-family: Arial;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      background: #222;
      color: white;
    }

    .box {
      background: #333;
      padding: 30px;
      border-radius: 10px;
    }

    input {
      display: block;
      margin: 10px 0;
      padding: 10px;
      width: 250px;
    }

    button {
      padding: 10px;
      width: 100%;
    }
  </style>
</head>

<body>

<div class="box">
  <h2>Register</h2>

  <input id="email" placeholder="Email">
  <input id="password" type="password" placeholder="Password">

  <button onclick="register()">Register</button>
</div>

<script>
const API = "http://52.91.254.60:5000";

async function register() {
  await fetch(API + "/register", {
    method: "POST",
    headers: {"Content-Type": "application/json"},
    body: JSON.stringify({
      email: email.value,
      password: password.value
    })
  });

  alert("Registered! Now login.");
  window.location = "login.html";
}
</script>

</body>
</html>
