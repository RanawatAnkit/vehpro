<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | VehPro</title>
    <link rel="stylesheet" href="style.css">
</head>
<body style="display: flex; align-items: center; justify-content: center;">

    <div class="form-box glass" style="margin-top: 0;">
        <h2 style="margin-bottom: 2rem; text-align: center;">Welcome Back</h2>
        
        <form id="loginForm">
            <div class="input-group">
                <label>Email Address</label>
                <input type="email" id="email" placeholder="name@example.com" required>
            </div>
            <div class="input-group">
                <label>Password</label>
                <input type="password" id="password" placeholder="••••••••" required>
            </div>
            <button type="submit" class="btn btn-primary" style="width: 100%; margin-top: 1rem;">Sign In</button>
        </form>

        <p style="text-align: center; margin-top: 2rem; font-size: 0.85rem; color: var(--text-muted);">
            Don't have an account? <a href="register.html" style="color: var(--primary); text-decoration: none;">Create one</a>
        </p>
    </div>

    <script src="app.js"></script>
    <script>
        document.getElementById("loginForm").addEventListener("submit", async (e) => {
            e.preventDefault();
            const email = document.getElementById("email").value;
            const password = document.getElementById("password").value;

            try {
                const res = await fetch(`${API}/login`, {
                    method: "POST",
                    headers: {"Content-Type": "application/json"},
                    body: JSON.stringify({ email, password })
                });

                if (!res.ok) throw new Error("Invalid credentials");

                const data = await res.json();
                localStorage.setItem("token", data.token);
                localStorage.setItem("role", data.role);
                localStorage.setItem("email", data.email);

                window.location = "index.html";
            } catch (err) {
                alert(err.message);
            }
        });
    </script>
</body>
</html>
