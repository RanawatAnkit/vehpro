<!DOCTYPE html>
<html>
<head>
  <title>VehPro</title>
  <style>
    body {
      margin: 0;
      font-family: 'Segoe UI';
      background: linear-gradient(to right, #0f2027, #203a43, #2c5364);
      color: white;
    }

    /* NAVBAR */
    .navbar {
      display: flex;
      justify-content: space-between;
      padding: 15px 30px;
      background: rgba(0,0,0,0.5);
      backdrop-filter: blur(10px);
      align-items: center;
    }

    .nav-links a, .nav-links button {
      color: white;
      margin-left: 15px;
      text-decoration: none;
      background: none;
      border: none;
      cursor: pointer;
      font-size: 14px;
    }

    .nav-links a:hover, .nav-links button:hover {
      color: #00e5ff;
    }

    /* CONTAINER */
    .container {
      padding: 30px;
    }

    /* GRID */
    .grid {
      display: flex;
      flex-wrap: wrap;
      gap: 20px;
    }

    /* CARD */
    .card {
      width: 260px;
      background: rgba(255,255,255,0.1);
      border-radius: 15px;
      overflow: hidden;
      backdrop-filter: blur(10px);
      transition: 0.3s;
    }

    .card:hover {
      transform: scale(1.05);
    }

    .card img {
      width: 100%;
      height: 160px;
      object-fit: cover;
    }

    .card-content {
      padding: 15px;
    }
  </style>
</head>

<body>

<!-- NAVBAR -->
<div class="navbar">
  <h2>VehPro 🚗</h2>
  <div class="nav-links" id="navLinks"></div>
</div>

<!-- CONTENT -->
<div class="container">
  <h1>Explore Cars</h1>
  <div id="cars" class="grid"></div>
</div>

<script>
const API = "http://52.91.254.60:5000";

/* 🔹 LOAD CARS */
async function loadCars() {
  try {
    const res = await fetch(API + "/cars");

    if (!res.ok) throw new Error("Server error");

    const data = await res.json();

    const container = document.getElementById("cars");
    container.innerHTML = "";

    data.forEach(car => {
      container.innerHTML += `
        <div class="card">
          <img src="${car.image_url}">
          <div class="card-content">
            <h3>${car.name}</h3>
            <p><b>${car.price}</b></p>
            <p>${car.description}</p>
          </div>
        </div>
      `;
    });

  } catch (err) {
    console.error("Error loading cars:", err);
  }
}

/* 🔹 NAVBAR ROLE LOGIC */
const role = localStorage.getItem("role");
const nav = document.getElementById("navLinks");

if (!role) {
  nav.innerHTML = `
    <a href="login.html">Login</a>
    <a href="register.html">Register</a>
  `;
} 
else if (role === "admin") {
  nav.innerHTML = `
    <a href="admin.html">Add Car</a>
    <button onclick="logout()">Logout</button>
  `;
} 
else {
  nav.innerHTML = `
    <button onclick="logout()">Logout</button>
  `;
}

/* 🔹 LOGOUT */
function logout() {
  localStorage.clear();
  location.reload();
}

/* 🔹 INIT */
loadCars();
</script>

</body>
</html>
