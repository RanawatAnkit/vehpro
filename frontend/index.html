<!DOCTYPE html>
<html>
<head>
  <title>VehPro</title>
  <style>
    body {
      margin: 0;
      font-family: 'Segoe UI';
      background: linear-gradient(to right, #0f2027, #203a43, #2c5364);
      color: white;
    }

    /* NAVBAR */
    .navbar {
      display: flex;
      justify-content: space-between;
      padding: 15px 30px;
      background: rgba(0,0,0,0.5);
      backdrop-filter: blur(10px);
    }

    .navbar a {
      color: white;
      margin-left: 20px;
      text-decoration: none;
      font-weight: 500;
    }

    .navbar a:hover {
      color: #00e5ff;
    }

    /* GRID */
    .container {
      padding: 30px;
    }

    .grid {
      display: flex;
      flex-wrap: wrap;
      gap: 20px;
    }

    /* CARD */
    .card {
      width: 260px;
      background: rgba(255,255,255,0.1);
      border-radius: 15px;
      overflow: hidden;
      backdrop-filter: blur(10px);
      transition: 0.3s;
    }

    .card:hover {
      transform: scale(1.05);
    }

    .card img {
      width: 100%;
      height: 160px;
      object-fit: cover;
    }

    .card-content {
      padding: 15px;
    }
  </style>
</head>

<body>

<div class="navbar">
  <h2>VehPro</h2>
  <div>
    <a href="index.html">Home</a>
    <a href="login.html">Login</a>
    <a href="admin.html">upload</a>
  </div>
</div>

<div class="container">
  <h1>Explore Cars</h1>
  <div id="cars" class="grid"></div>
</div>

<script>
const role = localStorage.getItem("role");

const nav = document.createElement("div");

if (!role) {
  nav.innerHTML = `
    <a href="login.html">Login</a>
    <a href="register.html">Register</a>
  `;
} else if (role === "admin") {
  nav.innerHTML = `
    <a href="admin.html">Add Car</a>
    <button onclick="logout()">Logout</button>
  `;
} else {
  nav.innerHTML = `
    <button onclick="logout()">Logout</button>
  `;
}

document.body.prepend(nav);

function logout() {
  localStorage.clear();
  location.reload();
}
</script>

</body>
</html>
