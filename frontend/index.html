<!DOCTYPE html>
<html>
<head>
  <title>VehPro</title>
  <style>
    body {
      margin: 0;
      font-family: 'Segoe UI';
      background: linear-gradient(to right, #0f2027, #203a43, #2c5364);
      color: white;
    }

    /* NAVBAR */
    .navbar {
      display: flex;
      justify-content: space-between;
      padding: 15px 30px;
      background: rgba(0,0,0,0.5);
      backdrop-filter: blur(10px);
    }

    .navbar a {
      color: white;
      margin-left: 20px;
      text-decoration: none;
      font-weight: 500;
    }

    .navbar a:hover {
      color: #00e5ff;
    }

    /* GRID */
    .container {
      padding: 30px;
    }

    .grid {
      display: flex;
      flex-wrap: wrap;
      gap: 20px;
    }

    /* CARD */
    .card {
      width: 260px;
      background: rgba(255,255,255,0.1);
      border-radius: 15px;
      overflow: hidden;
      backdrop-filter: blur(10px);
      transition: 0.3s;
    }

    .card:hover {
      transform: scale(1.05);
    }

    .card img {
      width: 100%;
      height: 160px;
      object-fit: cover;
    }

    .card-content {
      padding: 15px;
    }
  </style>
</head>

<body>

<div class="navbar">
  <h2>VehPro</h2>
  <div>
    <a href="index.html">Home</a>
    <a href="login.html">Login</a>
    <a href="admin.html">upload</a>
  </div>
</div>

<div class="container">
  <h1>Explore Cars</h1>
  <div id="cars" class="grid"></div>
</div>

<script>
const API = "http://52.91.254.60:5000";

async function loadCars() {
  const res = await fetch(API + "/cars");
  const data = await res.json();

  const container = document.getElementById("cars");

  data.forEach(car => {
    container.innerHTML += `
      <div class="card">
        <img src="${car.image_url}">
        <div class="card-content">
          <h3>${car.name}</h3>
          <p><b>${car.price}</b></p>
          <p>${car.description}</p>
        </div>
      </div>
    `;
  });
}

loadCars();
</script>

</body>
</html>
