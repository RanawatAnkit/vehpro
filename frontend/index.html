<h1>Cars</h1>
<div id="cars"></div>

<script>
const API = "http://52.91.254.60:5000";

async function loadCars() {
  const res = await fetch(API + "/cars");
  const data = await res.json();

  const container = document.getElementById("cars");

  data.forEach(car => {
    container.innerHTML += `
      <div>
        <img src="${car.image_url}" width="200"/>
        <h3>${car.name}</h3>
        <p>${car.price}</p>
        <p>${car.description}</p>
      </div>
    `;
  });
}

loadCars();
</script>
